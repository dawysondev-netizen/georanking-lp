version: "3.8"

services:
  georanking-lp:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: georanking-lp-local
    ports:
      - "3000:3000"
    volumes:
      - ../:/app
      - /app/node_modules
      - /app/.next
    environment:
      - WATCHPACK_POLLING=true
    env_file:
      - ../.env
    command: pnpm dev
